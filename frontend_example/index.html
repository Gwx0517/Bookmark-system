<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 现代设计</title>
    <meta name="description" content="精美的登录页面前端设计">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 背景元素 -->
    <div class="bg-container">
        <!-- 左上角浅灰色圆形 -->
        <div class="top-left-circle"></div>
        
        <!-- 底部山脉与吃豆人 -->
        <svg class="bottom-mountains" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice">
            <g id="scrolling-mountains">
                <!-- 错落有致的山脉（左低右高） -->
                <path class="mountain" fill="#333333" stroke="#333333" stroke-width="1.5" d="M 0,900 L 0,650 Q 350,450 780,780 Q 1150,350 1440,650 L 1440,900 Z" />
                <!-- 左侧的补充山脉，用于无缝循环 -->
                <path class="mountain" fill="#333333" stroke="#333333" stroke-width="1.5" transform="translate(-1440, 0)" d="M 0,900 L 0,650 Q 350,450 780,780 Q 1150,350 1440,650 L 1440,900 Z" />
            </g>
            
            <!-- 黄色吃豆人，站在右侧山脉边缘，嘴巴朝左 -->
            <g id="pacman" class="pacman-group" transform="translate(1200, 485)">
                <path class="pacman-mouth" fill="#DDA142" d="M 0,0 L -65,-37.5 A 75,75 0 1,1 -65,37.5 Z" />
                <circle class="pacman-eye" cx="-15" cy="-35" r="9" fill="#000" />
            </g>
        </svg>
    </div>

    <!-- 登录卡片容器 -->
    <div class="login-wrapper">
        <main class="login-card">
            <h2>登录</h2>
            <form action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <input type="text" id="username" placeholder="用户名" required autocomplete="username">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="密码" required autocomplete="current-password">
                </div>
                <div class="button-container">
                    <button type="submit" class="login-btn">登录</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        const pacman = document.getElementById('pacman');
        const mountains = document.getElementById('scrolling-mountains');
        let offset = 0;
        const speed = 1.5; // 控制山脉移动速度，数值越大越快
        const pacmanX = 1200;
        
        // 缩放设置
        const originalRadius = 75;
        const scale = 0.8; // 将吃豆人缩小为原来的 80%
        const radius = originalRadius * scale; // 实际占用半径

        let currentAngle = null;

        function getMountainY(x) {
            // 基于二阶贝塞尔曲线方程计算具体地形高度
            if (x < 780) {
                const t = (-700 + Math.sqrt(490000 + 320 * x)) / 160;
                return Math.pow(1 - t, 2) * 650 + 2 * (1 - t) * t * 450 + Math.pow(t, 2) * 780;
            } else {
                const t = (740 - Math.sqrt(547600 + 320 * (780 - x))) / 160;
                return Math.pow(1 - t, 2) * 780 + 2 * (1 - t) * t * 350 + Math.pow(t, 2) * 650;
            }
        }

        // 真正的物理碰撞模拟：利用闵可夫斯基和计算完美的圆心高度
        // 它会扫描吃豆人底下的所有地形，找到一个刚好不穿模的最低圆心位置
        function getPhysicalCenterY(cx) {
            let minYc = Infinity;
            // 扫描吃豆人半径范围内的所有地形
            for (let dx = -radius; dx <= radius; dx += 2) {
                let sampleX = cx + dx;
                // 处理地形的无缝循环映射
                if (sampleX < 0) {
                    sampleX = 1440 - ((-sampleX) % 1440);
                }
                sampleX = sampleX % 1440;
                
                let gy = getMountainY(sampleX);
                // 要保证在这个点不穿模，圆心最多只能低到这个高度（Y越小越高）
                let requiredYc = gy - Math.sqrt(radius * radius - dx * dx);
                if (requiredYc < minYc) {
                    minYc = requiredYc; // 取所有限制中最严格的那个
                }
            }
            return minYc;
        }

        function animate() {
            offset += speed;
            if (offset >= 1440) offset -= 1440;
            
            // 移动山脉，实现循环播放
            mountains.setAttribute('transform', `translate(${offset}, 0)`);
            
            // 计算吃豆人中心的局部X坐标
            let localX = pacmanX - offset;
            if (localX < 0) localX += 1440;
            
            // 获取物理碰撞下最真实的圆心Y坐标（完美解决卡进山脉的bug）
            const y = getPhysicalCenterY(localX);
            
            // 为了获得最真实的切线角度，我们在它的运动轨迹上取两个临近点求导
            // 这种方法天然会把尖锐的山谷和平缓的坡度给平滑掉，解决转向突兀的问题
            const yNext = getPhysicalCenterY(localX + 2);
            const yPrev = getPhysicalCenterY(localX - 2);
            const slope = (yNext - yPrev) / 4;
            
            const targetAngle = Math.atan(slope) * 180 / Math.PI;
            
            // 进一步减小插值系数（从0.15降为0.08），让掉头动作显得更加从容、柔软和丝滑
            if (currentAngle === null) {
                currentAngle = targetAngle;
            } else {
                currentAngle += (targetAngle - currentAngle) * 0.08;
            }
            
            pacman.setAttribute('transform', `translate(${pacmanX}, ${y}) scale(${scale}) rotate(${currentAngle})`);
            
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
